<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.min.css">
</head>

<body>

    <header class="header">
        <div class="big-container">
            <div class="header__inner">
                <a class="header__logo logo" href="#" data-aos="fade">
                    <img src="images/logo.svg" alt="logo">
                </a>
                <div class="header__wrapper">
                    <div class="header__langs langs" data-aos="fade">
                        <ul class="langs__list">
                            <li class="langs__item">
                                <a class="langs__link" href="#">
                                    KZ
                                </a>
                            </li>
                            <li class="langs__item langs__item--active">
                                RU
                            </li>
                            <li class="langs__item">
                                <a class="langs__link" href="#">
                                    EN
                                </a>
                            </li>
                        </ul>
                    </div>
                    <nav class="header__menu menu" data-aos="fade">
                        <ul class="menu__list">
                            <li class="menu__item">
                                <a class="menu__link" href="#">
                                    Пункт один
                                </a>
                            </li>
                            <li class="menu__item">
                                <a class="menu__link" href="#">
                                    Пункт два
                                </a>
                            </li>
                            <li class="menu__item">
                                <a class="menu__link" href="#">
                                    Пункт три
                                </a>
                            </li>
                        </ul>
                    </nav>
                    <div class="header__wrap" data-aos="fade">
                        <a class="header__link btn btn--blue btn--small" href="#">
                            <span>
                                Личный кабинет
                            </span>
                        </a>
                    </div>
                </div>
                <div class="header__burger" data-aos="fade">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </header>

    <div class="wrapper">
        <main class="main">
            <section class="main__entrance entrance">
                <div class="container">
                    <div class="entrance__inner">
                        <div class="entrance__body">
                            <div class="entrance__titling">
                                <h2 class="entrance__title">
                                    Вход
                                </h2>
                            </div>
                            <form class="entrance__form" action="#">
                                <div class="entrance__wrapper">
                                    <div class="entrance__box">
                                        <label class="entrance__label" for="entrance-login">
                                            Ваш логин
                                        </label>
                                        <input class="entrance__input" id="entrance-login" name="login" type="text"
                                            placeholder="" autocomplete="username">
                                    </div>
                                    <div class="entrance__box">
                                        <label class="entrance__label" for="entrance-password">
                                            Пароль
                                        </label>
                                        <input class="entrance__input" id="entrance-password" name="password"
                                            type="password" placeholder="" autocomplete="current-password">
                                    </div>
                                </div>
                                <button class="entrance__btn btn btn--blue" type="submit">
                                    <span>
                                        Войти
                                    </span>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </section>
        </main>
        <footer class="footer">
            <div class="big-container">
                <div class="footer__inner">
                    <a class="footer__logo logo" href="#" data-aos="fade">
                        <img src="images/logo-white.svg" alt="logo">
                    </a>
                    <nav class="footer__menu menu">
                        <ul class="menu__list">
                            <li class="menu__item">
                                <a class="menu__link" href="#">
                                    Пункт один
                                </a>
                            </li>
                            <li class="menu__item">
                                <a class="menu__link" href="#">
                                    Пункт два
                                </a>
                            </li>
                            <li class="menu__item">
                                <a class="menu__link" href="#">
                                    Пункт три
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </footer>
    </div>

    <script src="js/jquery.js"></script>
    <script src="js/main.min.js"></script>
</body>

</html>
